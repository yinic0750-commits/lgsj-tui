# Reasonix configuration for LGCode.
# This is the project's working config. API keys are loaded from .env via
# api_key_env and never stored here.

default_model = "deepseek-flash"
language      = "zh"

[ui]
theme = "auto"

[agent]
system_prompt = """
你是 LGcode，一个专注于执行代码任务的编程助手。
使用提供的工具来读写文件和运行 Shell 命令。
原则：先理解需求再行动；用工具验证而非猜测；保持修改最小化且正确；简要总结你所做的操作。
当请求确实需要用户做选择时——选用哪种方案或库、确定范围、或涉及重大且有歧义的决策——调用 ask 工具提供 2-4 个具体选项，而不是猜测或在文字中埋问题。有明确默认值时跳过提问；不要仅为确认而询问。在自动批准模式下不代用户回答 ask 问题或批准计划。如果没有交互用户，ask 工具返回模型假设的回退值；在继续之前声明你所做的假设。
对于多步骤工作，用 todo_write 工具跟踪进度：列出步骤，始终保持一个 in_progress，完成后逐一翻转为 completed——边做边更新，而非最后才更新。
在计划模式下框架会阻止写入工具：先做只读研究，然后写出简明的计划作为回复并停止。用户批准后才会进行修改；批准后按步骤执行，同时更新任务列表。

重要：所有用户可见的 UI 文本、状态标签、提示信息必须使用中文。
例如：状态栏标签用"自动"而非"Auto"，"计划"而非"Plan"，"目标"而非"Goal"，"询问"而非"Ask"，"壳模式"而非"Shell"，"回溯"而非"rewind"，"MCP导入"而非"MCP import"，"反馈已排队"而非"feedback queued"。
思考过程可以用中文输出。"""
max_steps         = 0
planner_max_steps = 12
temperature       = 0.0
auto_plan         = "off"
reasoning_language = "zh"

# DeepSeek — Anthropic-compatible endpoint, two SKUs share one base_url/key.
[[providers]]
name           = "deepseek"
kind           = "anthropic"
base_url       = "https://api.deepseek.com/anthropic"
models         = ["deepseek-v4-flash", "deepseek-v4-pro"]
default        = "deepseek-v4-flash"
api_key_env    = "DEEPSEEK_API_KEY"
context_window = 1000000

# Aliases pointing at the same endpoint for quick /model switches.
[[providers]]
name        = "deepseek-flash"
kind        = "anthropic"
base_url    = "https://api.deepseek.com/anthropic"
model       = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
context_window = 1000000

[[providers]]
name        = "deepseek-pro"
kind        = "anthropic"
base_url    = "https://api.deepseek.com/anthropic"
model       = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
context_window = 1000000

# Custom: ModelHub gateway. OpenAI-compatible.
[[providers]]
name           = "modelhub"
kind           = "openai"
base_url       = "https://modelhub.lgdg.cc/aigateway/v1"
models         = ["GLM-5.1-w4a8"]
default        = "GLM-5.1-w4a8"
api_key_env    = "MODELHUB_API_KEY"
context_window = 128000
# This gateway is not DeepSeek-flavored, so we tell the openai kind to use
# the standard reasoning_effort wire shape and skip DeepSeek heuristics.
reasoning_protocol = "openai"
# Disable extended thinking fields entirely (the gateway is plain
# chat-completions); safer than letting the auto-detect flip a knob.
supported_efforts  = []
default_effort     = ""

[tools]
enabled = []
bash_timeout_seconds = 120
